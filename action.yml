name: "Emailens Email Preview Check"
description: "Check HTML email templates for rendering issues across 15 email clients. Fails the build if compatibility scores drop below threshold."
author: "Emailens"

branding:
  icon: "mail"
  color: "purple"

inputs:
  pattern:
    description: "Glob pattern to find email HTML files (e.g. 'emails/**/*.html')"
    required: false
    default: "emails/**/*.html"
  threshold:
    description: "Minimum compatibility score (0-100) per client. Fails if any client scores below this."
    required: false
    default: "70"
  format:
    description: "Input format: 'html' (default), 'jsx', 'mjml', or 'maizzle'"
    required: false
    default: "html"
  api-key:
    description: "Emailens API key for authenticated requests (optional for free tier)"
    required: false
  clients:
    description: "Comma-separated list of client IDs to check (default: all clients)"
    required: false
  max-files:
    description: "Maximum number of files to check (default: 50)"
    required: false
    default: "50"
  fail-on-error:
    description: "Whether to fail the action if critical errors are found"
    required: false
    default: "true"

outputs:
  results:
    description: "JSON array with per-file analysis results"
    value: ${{ steps.check.outputs.results }}
  passed:
    description: "'true' if all files pass the threshold, 'false' otherwise"
    value: ${{ steps.check.outputs.passed }}
  summary:
    description: "Human-readable summary of results"
    value: ${{ steps.check.outputs.summary }}

runs:
  using: "composite"
  steps:
    - name: Check email compatibility
      id: check
      shell: bash
      env:
        INPUT_PATTERN: ${{ inputs.pattern }}
        INPUT_THRESHOLD: ${{ inputs.threshold }}
        INPUT_FORMAT: ${{ inputs.format }}
        INPUT_API_KEY: ${{ inputs.api-key }}
        INPUT_CLIENTS: ${{ inputs.clients }}
        INPUT_MAX_FILES: ${{ inputs.max-files }}
        INPUT_FAIL_ON_ERROR: ${{ inputs.fail-on-error }}
      run: |
        set -euo pipefail

        API_URL="https://emailens.dev/api/preview"

        # ── Mask API key ───────────────────────────────────────────────
        if [ -n "${INPUT_API_KEY:-}" ]; then
          echo "::add-mask::$INPUT_API_KEY"
        fi

        # ── Check dependencies ─────────────────────────────────────────
        if ! command -v jq &>/dev/null; then
          echo "::error::jq is required but not installed. Install jq or use a GitHub-hosted runner."
          exit 1
        fi
        if ! command -v curl &>/dev/null; then
          echo "::error::curl is required but not installed."
          exit 1
        fi

        # ── Validate inputs ────────────────────────────────────────────
        if ! [[ "$INPUT_THRESHOLD" =~ ^[0-9]+$ ]] || [ "$INPUT_THRESHOLD" -lt 0 ] || [ "$INPUT_THRESHOLD" -gt 100 ]; then
          echo "::error::threshold must be an integer between 0 and 100 (got '$INPUT_THRESHOLD')"
          exit 1
        fi
        if ! [[ "$INPUT_MAX_FILES" =~ ^[0-9]+$ ]] || [ "$INPUT_MAX_FILES" -lt 1 ]; then
          echo "::error::max-files must be a positive integer (got '$INPUT_MAX_FILES')"
          exit 1
        fi
        case "$INPUT_FORMAT" in
          html|jsx|mjml|maizzle) ;;
          *) echo "::error::format must be html, jsx, mjml, or maizzle (got '$INPUT_FORMAT')"; exit 1 ;;
        esac

        # ── Find files using bash globstar ─────────────────────────────
        shopt -s globstar nullglob
        FILES_ARRAY=( $INPUT_PATTERN )
        shopt -u globstar nullglob

        if [ ${#FILES_ARRAY[@]} -eq 0 ]; then
          echo "::warning::No email HTML files found matching pattern '$INPUT_PATTERN'"
          echo "passed=true" >> "$GITHUB_OUTPUT"
          echo "summary=No files found" >> "$GITHUB_OUTPUT"
          echo "results=[]" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        TOTAL_FOUND=${#FILES_ARRAY[@]}

        if [ "$TOTAL_FOUND" -gt "$INPUT_MAX_FILES" ]; then
          echo "::warning::Found $TOTAL_FOUND files but max-files is $INPUT_MAX_FILES. Checking first $INPUT_MAX_FILES only."
          FILES_ARRAY=( "${FILES_ARRAY[@]:0:$INPUT_MAX_FILES}" )
        fi

        echo "Found ${#FILES_ARRAY[@]} email template(s)"

        # ── Temp directory ─────────────────────────────────────────────
        TMPDIR="${RUNNER_TEMP:-/tmp}/emailens-$$"
        mkdir -p "$TMPDIR"
        cleanup() { rm -rf "$TMPDIR"; }
        trap cleanup EXIT

        # ── jq --rawfile compatibility (requires jq 1.6+) ─────────────
        JQ_VERSION=$(jq --version 2>&1 | grep -oP '[\d.]+' | head -1)
        HAS_RAWFILE=true
        if [ "$(printf '%s\n' "1.6" "$JQ_VERSION" | sort -V | head -1)" != "1.6" ]; then
          HAS_RAWFILE=false
          echo "::notice::jq $JQ_VERSION detected (< 1.6). Using fallback for file reading."
        fi

        # ── Process files ──────────────────────────────────────────────
        PASSED=true
        SUMMARY=""
        ALL_RESULTS="[]"
        TOTAL_FILES=0
        FAILED_FILES=0
        MAX_RETRIES=2

        for FILE in "${FILES_ARRAY[@]}"; do
          [ -f "$FILE" ] || continue
          TOTAL_FILES=$((TOTAL_FILES + 1))
          echo "::group::Checking $FILE"

          TMPBODY="$TMPDIR/body-$TOTAL_FILES.json"
          TMPRESPONSE="$TMPDIR/response-$TOTAL_FILES.json"

          # Build request body via jq (safe for any content)
          if [ "$HAS_RAWFILE" = true ]; then
            REQUEST=$(jq -n --rawfile html "$FILE" '{html: $html}')
          else
            # Fallback: read file content via slurp
            REQUEST=$(jq -Rs '{html: .}' "$FILE")
          fi

          if [ "$INPUT_FORMAT" != "html" ]; then
            REQUEST=$(echo "$REQUEST" | jq --arg fmt "$INPUT_FORMAT" '. + {format: $fmt}')
          fi

          if [ -n "${INPUT_CLIENTS:-}" ]; then
            CLIENT_ARRAY=$(echo "$INPUT_CLIENTS" | jq -R -c 'split(",")')
            REQUEST=$(echo "$REQUEST" | jq --argjson clients "$CLIENT_ARRAY" '. + {clients: $clients}')
          fi

          echo "$REQUEST" > "$TMPBODY"

          # Call API with retry (honors Retry-After header)
          HEADERS=(-H "Content-Type: application/json")
          if [ -n "${INPUT_API_KEY:-}" ]; then
            HEADERS+=(-H "Authorization: Bearer $INPUT_API_KEY")
          fi

          HTTP_CODE=""
          for ATTEMPT in $(seq 0 $MAX_RETRIES); do
            if [ "$ATTEMPT" -gt 0 ]; then
              # Check Retry-After header from previous response, fall back to exponential
              RETRY_AFTER=$(grep -i "^retry-after:" "$TMPDIR/headers-$TOTAL_FILES" 2>/dev/null | awk '{print $2}' | tr -d '\r' || true)
              DELAY=${RETRY_AFTER:-$((ATTEMPT * 2))}
              # Cap delay at 30s
              [ "$DELAY" -gt 30 ] 2>/dev/null && DELAY=30
              echo "  Retrying in ${DELAY}s (attempt $((ATTEMPT + 1))/$((MAX_RETRIES + 1)))..."
              sleep "$DELAY"
            fi

            HTTP_CODE=$(curl -s -w "%{http_code}" \
              -o "$TMPRESPONSE" \
              -D "$TMPDIR/headers-$TOTAL_FILES" \
              -X POST "$API_URL" \
              "${HEADERS[@]}" \
              --data-binary @"$TMPBODY" \
              --max-time 60)

            # Retry on 429 or 5xx
            if [ "$HTTP_CODE" = "429" ] || [ "${HTTP_CODE:0:1}" = "5" ]; then
              echo "  HTTP $HTTP_CODE — transient error"
              continue
            fi
            break
          done

          RESPONSE_BODY=$(cat "$TMPRESPONSE")

          if [ "$HTTP_CODE" != "200" ]; then
            ERROR_MSG=$(echo "$RESPONSE_BODY" | jq -r '.error // empty' 2>/dev/null || true)
            echo "::error file=$FILE::API request failed (HTTP $HTTP_CODE)${ERROR_MSG:+: $ERROR_MSG}"
            PASSED=false
            FAILED_FILES=$((FAILED_FILES + 1))
            echo "::endgroup::"
            continue
          fi

          # Validate response has expected shape
          if ! echo "$RESPONSE_BODY" | jq -e '.compatibilityScores' &>/dev/null; then
            echo "::error file=$FILE::Unexpected API response (missing compatibilityScores)"
            PASSED=false
            FAILED_FILES=$((FAILED_FILES + 1))
            echo "::endgroup::"
            continue
          fi

          # Parse scores
          FILE_PASSED=true
          FILE_SUMMARY=""

          while IFS= read -r CLIENT_ID; do
            SCORE=$(echo "$RESPONSE_BODY" | jq -r --arg c "$CLIENT_ID" '.compatibilityScores[$c].score // 0')
            ERRORS=$(echo "$RESPONSE_BODY" | jq -r --arg c "$CLIENT_ID" '.compatibilityScores[$c].errors // 0')
            WARNINGS=$(echo "$RESPONSE_BODY" | jq -r --arg c "$CLIENT_ID" '.compatibilityScores[$c].warnings // 0')

            ICON="ok"
            if [ "$SCORE" -lt "$INPUT_THRESHOLD" ]; then
              ICON="FAIL"
              FILE_PASSED=false
              echo "::error file=$FILE::$CLIENT_ID score $SCORE is below threshold $INPUT_THRESHOLD (${ERRORS}E ${WARNINGS}W)"
            elif [ "$ERRORS" -gt 0 ] && [ "$INPUT_FAIL_ON_ERROR" = "true" ]; then
              ICON="WARN"
              FILE_PASSED=false
              echo "::warning file=$FILE::$CLIENT_ID has $ERRORS error(s) (score: $SCORE)"
            fi

            FILE_SUMMARY="${FILE_SUMMARY}\n  [$ICON] $CLIENT_ID: $SCORE/100 (${ERRORS}E ${WARNINGS}W)"
          done < <(echo "$RESPONSE_BODY" | jq -r '.compatibilityScores | keys[]')

          if [ "$FILE_PASSED" = false ]; then
            PASSED=false
            FAILED_FILES=$((FAILED_FILES + 1))
          fi

          # Append to results array (cap at 500KB to stay under GitHub's 1MB output limit)
          RESULT_ENTRY=$(echo "$RESPONSE_BODY" | jq --arg file "$FILE" '{file: $file, scores: .compatibilityScores}')
          CANDIDATE=$(echo "$ALL_RESULTS" | jq --argjson entry "$RESULT_ENTRY" '. + [$entry]')
          if [ ${#CANDIDATE} -lt 512000 ]; then
            ALL_RESULTS="$CANDIDATE"
          else
            echo "::warning::Results output truncated at $TOTAL_FILES files to stay within GitHub output limits."
          fi

          SUMMARY="${SUMMARY}\n$FILE:$FILE_SUMMARY"
          echo -e "$FILE_SUMMARY"
          echo "::endgroup::"
        done

        # ── Set outputs ────────────────────────────────────────────────
        echo "passed=$PASSED" >> "$GITHUB_OUTPUT"

        echo "summary<<EMAILENS_EOF" >> "$GITHUB_OUTPUT"
        echo -e "$SUMMARY" >> "$GITHUB_OUTPUT"
        echo "EMAILENS_EOF" >> "$GITHUB_OUTPUT"

        echo "results<<EMAILENS_RESULTS_EOF" >> "$GITHUB_OUTPUT"
        echo "$ALL_RESULTS" >> "$GITHUB_OUTPUT"
        echo "EMAILENS_RESULTS_EOF" >> "$GITHUB_OUTPUT"

        # ── Job summary ────────────────────────────────────────────────
        {
          echo "## Emailens Email Preview Check"
          echo ""
          if [ "$PASSED" = true ]; then
            echo "**All $TOTAL_FILES template(s) passed** (threshold: $INPUT_THRESHOLD/100)"
          else
            echo "**$FAILED_FILES of $TOTAL_FILES template(s) failed** (threshold: $INPUT_THRESHOLD/100)"
          fi
          echo ""
          echo -e "$SUMMARY"
        } >> "$GITHUB_STEP_SUMMARY"

        # ── Exit ───────────────────────────────────────────────────────
        if [ "$PASSED" = false ]; then
          echo ""
          echo "Email compatibility check failed. $FAILED_FILES file(s) below threshold."
          exit 1
        fi

        echo ""
        echo "All email templates pass compatibility threshold ($INPUT_THRESHOLD/100)"
