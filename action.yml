name: "Emailens Email Preview Check"
description: "Check HTML email templates for rendering issues across 15 email clients. Fails the build if compatibility scores drop below threshold."
author: "Emailens"

branding:
  icon: "mail"
  color: "purple"

inputs:
  pattern:
    description: "Glob pattern to find email HTML files (e.g. 'emails/**/*.html')"
    required: false
    default: "emails/**/*.html"
  threshold:
    description: "Minimum compatibility score (0-100) per client. Fails if any client scores below this."
    required: false
    default: "70"
  format:
    description: "Input format: 'html' (default), 'jsx', 'mjml', or 'maizzle'"
    required: false
    default: "html"
  api-key:
    description: "Emailens API key for authenticated requests (optional for free tier)"
    required: false
  clients:
    description: "Comma-separated list of client IDs to check (default: all clients)"
    required: false
  max-files:
    description: "Maximum number of files to check (default: 50)"
    required: false
    default: "50"
  fail-on-error:
    description: "Whether to fail the action if critical errors are found"
    required: false
    default: "true"

outputs:
  results:
    description: "JSON array with per-file analysis results"
    value: ${{ steps.check.outputs.results }}
  passed:
    description: "'true' if all files pass the threshold, 'false' otherwise"
    value: ${{ steps.check.outputs.passed }}
  summary:
    description: "Human-readable summary of results"
    value: ${{ steps.check.outputs.summary }}

runs:
  using: "composite"
  steps:
    - name: Check email compatibility
      id: check
      shell: bash
      env:
        INPUT_PATTERN: ${{ inputs.pattern }}
        INPUT_THRESHOLD: ${{ inputs.threshold }}
        INPUT_FORMAT: ${{ inputs.format }}
        INPUT_API_KEY: ${{ inputs.api-key }}
        INPUT_CLIENTS: ${{ inputs.clients }}
        INPUT_MAX_FILES: ${{ inputs.max-files }}
        INPUT_FAIL_ON_ERROR: ${{ inputs.fail-on-error }}
      run: |
        # Disable set -e — we handle errors explicitly to avoid silent crashes
        set -uo pipefail

        API_URL="https://emailens.dev/api/preview"

        # ── Mask API key ───────────────────────────────────────────────
        if [ -n "${INPUT_API_KEY:-}" ]; then
          echo "::add-mask::$INPUT_API_KEY"
        fi

        # ── Check dependencies ─────────────────────────────────────────
        for cmd in jq curl; do
          if ! command -v "$cmd" &>/dev/null; then
            echo "::error::$cmd is required but not installed. Use a GitHub-hosted runner or install it."
            exit 1
          fi
        done

        # ── Validate inputs ────────────────────────────────────────────
        if ! [[ "$INPUT_THRESHOLD" =~ ^[0-9]+$ ]] || [ "$INPUT_THRESHOLD" -lt 0 ] || [ "$INPUT_THRESHOLD" -gt 100 ]; then
          echo "::error::threshold must be an integer between 0 and 100 (got '$INPUT_THRESHOLD')"
          exit 1
        fi
        if ! [[ "$INPUT_MAX_FILES" =~ ^[0-9]+$ ]] || [ "$INPUT_MAX_FILES" -lt 1 ]; then
          echo "::error::max-files must be a positive integer (got '$INPUT_MAX_FILES')"
          exit 1
        fi
        case "$INPUT_FORMAT" in
          html|jsx|mjml|maizzle) ;;
          *) echo "::error::format must be html, jsx, mjml, or maizzle (got '$INPUT_FORMAT')"; exit 1 ;;
        esac

        # ── Find files using bash globstar ─────────────────────────────
        shopt -s globstar nullglob
        FILES_ARRAY=( $INPUT_PATTERN )
        shopt -u globstar nullglob

        # Filter to regular files only (exclude directories)
        FILTERED=()
        for f in "${FILES_ARRAY[@]}"; do
          [ -f "$f" ] && FILTERED+=("$f")
        done
        FILES_ARRAY=("${FILTERED[@]+"${FILTERED[@]}"}")

        if [ ${#FILES_ARRAY[@]} -eq 0 ]; then
          echo "::warning::No email HTML files found matching pattern '$INPUT_PATTERN'"
          echo "passed=true" >> "$GITHUB_OUTPUT"
          echo "summary=No files found" >> "$GITHUB_OUTPUT"
          echo "results=[]" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        TOTAL_FOUND=${#FILES_ARRAY[@]}

        if [ "$TOTAL_FOUND" -gt "$INPUT_MAX_FILES" ]; then
          echo "::warning::Found $TOTAL_FOUND files but max-files is $INPUT_MAX_FILES. Checking first $INPUT_MAX_FILES only."
          FILES_ARRAY=( "${FILES_ARRAY[@]:0:$INPUT_MAX_FILES}" )
        fi

        echo "Found ${#FILES_ARRAY[@]} email template(s)"

        # ── Temp directory ─────────────────────────────────────────────
        WORK_DIR="${RUNNER_TEMP:-/tmp}/emailens-$$"
        mkdir -p "$WORK_DIR"
        cleanup() { rm -rf "$WORK_DIR"; }
        trap cleanup EXIT

        # ── Randomized HEREDOC delimiter (prevents injection) ──────────
        DELIM="EMAILENS_$(head -c 16 /dev/urandom | base64 | tr -dc 'A-Za-z0-9' | head -c 16)"

        # ── jq version check (--rawfile requires 1.6+) ────────────────
        HAS_RAWFILE=true
        if ! jq -n --rawfile x /dev/null '""' &>/dev/null; then
          HAS_RAWFILE=false
          echo "::notice::jq $(jq --version 2>&1) does not support --rawfile. Using fallback."
        fi

        # ── Process files ──────────────────────────────────────────────
        PASSED=true
        SUMMARY=""
        ALL_RESULTS="[]"
        TOTAL_FILES=0
        FAILED_FILES=0
        RESULTS_TRUNCATED=false
        MAX_RETRIES=2

        for FILE in "${FILES_ARRAY[@]}"; do
          TOTAL_FILES=$((TOTAL_FILES + 1))
          echo "::group::Checking $FILE"

          TMPBODY="$WORK_DIR/body-$TOTAL_FILES.json"
          TMPRESPONSE="$WORK_DIR/response-$TOTAL_FILES.json"
          TMPHEADERS="$WORK_DIR/headers-$TOTAL_FILES.txt"

          # Build request body via jq (safe for any content)
          if [ "$HAS_RAWFILE" = true ]; then
            jq -n --rawfile html "$FILE" '{html: $html}' > "$TMPBODY" 2>/dev/null
          else
            jq -Rs '{html: .}' < "$FILE" > "$TMPBODY" 2>/dev/null
          fi

          if [ ! -s "$TMPBODY" ]; then
            echo "::error file=$FILE::Failed to read file or build request body"
            PASSED=false
            FAILED_FILES=$((FAILED_FILES + 1))
            echo "::endgroup::"
            continue
          fi

          if [ "$INPUT_FORMAT" != "html" ]; then
            jq --arg fmt "$INPUT_FORMAT" '. + {format: $fmt}' < "$TMPBODY" > "$TMPBODY.tmp" && mv "$TMPBODY.tmp" "$TMPBODY"
          fi

          if [ -n "${INPUT_CLIENTS:-}" ]; then
            # Trim spaces around commas
            CLEAN_CLIENTS=$(echo "$INPUT_CLIENTS" | sed 's/ *, */,/g')
            jq --argjson clients "$(echo "$CLEAN_CLIENTS" | jq -R -c 'split(",")')" '. + {clients: $clients}' < "$TMPBODY" > "$TMPBODY.tmp" && mv "$TMPBODY.tmp" "$TMPBODY"
          fi

          # Call API with retry
          CURL_HEADERS=(-H "Content-Type: application/json")
          if [ -n "${INPUT_API_KEY:-}" ]; then
            CURL_HEADERS+=(-H "Authorization: Bearer $INPUT_API_KEY")
          fi

          HTTP_CODE=""
          for ATTEMPT in $(seq 0 $MAX_RETRIES); do
            if [ "$ATTEMPT" -gt 0 ]; then
              # Parse Retry-After (only accept integer seconds, ignore date format)
              RETRY_AFTER=""
              if [ -f "$TMPHEADERS" ]; then
                RETRY_AFTER=$(grep -i "^retry-after:" "$TMPHEADERS" 2>/dev/null | awk '{print $2}' | tr -d '\r' || true)
              fi
              # Validate it's a reasonable integer, otherwise use exponential backoff
              if [[ "$RETRY_AFTER" =~ ^[0-9]+$ ]] && [ "$RETRY_AFTER" -le 30 ]; then
                DELAY="$RETRY_AFTER"
              else
                DELAY=$((ATTEMPT * 2))
              fi
              echo "  Retrying in ${DELAY}s (attempt $((ATTEMPT + 1))/$((MAX_RETRIES + 1)))..."
              sleep "$DELAY"
            fi

            HTTP_CODE=$(curl -s -w "%{http_code}" \
              -o "$TMPRESPONSE" \
              -D "$TMPHEADERS" \
              -X POST "$API_URL" \
              "${CURL_HEADERS[@]}" \
              --data-binary @"$TMPBODY" \
              --max-time 60 \
              2>/dev/null) || HTTP_CODE="000"

            # Retry on network failure, 429, or 5xx
            if [ "$HTTP_CODE" = "000" ] || [ "$HTTP_CODE" = "429" ] || [[ "$HTTP_CODE" =~ ^5[0-9][0-9]$ ]]; then
              echo "  HTTP $HTTP_CODE — transient error"
              continue
            fi
            break
          done

          # Read response body safely
          RESPONSE_BODY=""
          if [ -f "$TMPRESPONSE" ]; then
            RESPONSE_BODY=$(cat "$TMPRESPONSE")
          fi

          if [ "$HTTP_CODE" != "200" ]; then
            ERROR_MSG=$(echo "$RESPONSE_BODY" | jq -r '.error // empty' 2>/dev/null || true)
            echo "::error file=$FILE::API request failed (HTTP $HTTP_CODE)${ERROR_MSG:+: $ERROR_MSG}"
            PASSED=false
            FAILED_FILES=$((FAILED_FILES + 1))
            echo "::endgroup::"
            continue
          fi

          # Validate response has expected shape
          if ! echo "$RESPONSE_BODY" | jq -e '.compatibilityScores' &>/dev/null; then
            echo "::error file=$FILE::Unexpected API response (missing compatibilityScores)"
            PASSED=false
            FAILED_FILES=$((FAILED_FILES + 1))
            echo "::endgroup::"
            continue
          fi

          # Parse scores — extract all at once to avoid repeated jq calls on bad JSON
          SCORES_JSON=$(echo "$RESPONSE_BODY" | jq -c '.compatibilityScores' 2>/dev/null) || {
            echo "::error file=$FILE::Failed to parse compatibility scores"
            PASSED=false
            FAILED_FILES=$((FAILED_FILES + 1))
            echo "::endgroup::"
            continue
          }

          FILE_PASSED=true
          FILE_SUMMARY=""

          while IFS=$'\t' read -r CLIENT_ID SCORE ERRORS WARNINGS; do
            ICON="ok"
            if [ "$SCORE" -lt "$INPUT_THRESHOLD" ] 2>/dev/null; then
              ICON="FAIL"
              FILE_PASSED=false
              echo "::error file=$FILE::$CLIENT_ID score $SCORE is below threshold $INPUT_THRESHOLD (${ERRORS}E ${WARNINGS}W)"
            elif [ "$ERRORS" -gt 0 ] 2>/dev/null && [ "$INPUT_FAIL_ON_ERROR" = "true" ]; then
              ICON="WARN"
              FILE_PASSED=false
              echo "::warning file=$FILE::$CLIENT_ID has $ERRORS error(s) (score: $SCORE)"
            fi

            FILE_SUMMARY="${FILE_SUMMARY}\n  [$ICON] $CLIENT_ID: $SCORE/100 (${ERRORS}E ${WARNINGS}W)"
          done < <(echo "$SCORES_JSON" | jq -r 'to_entries[] | [.key, (.value.score // 0), (.value.errors // 0), (.value.warnings // 0)] | @tsv')

          if [ "$FILE_PASSED" = false ]; then
            PASSED=false
            FAILED_FILES=$((FAILED_FILES + 1))
          fi

          # Append to results array (cap at 500KB to stay under GitHub's 1MB output limit)
          if [ "$RESULTS_TRUNCATED" = false ]; then
            RESULT_ENTRY=$(echo "$SCORES_JSON" | jq --arg file "$FILE" '{file: $file, scores: .}' 2>/dev/null) || RESULT_ENTRY=""
            if [ -n "$RESULT_ENTRY" ]; then
              CANDIDATE=$(echo "$ALL_RESULTS" | jq --argjson entry "$RESULT_ENTRY" '. + [$entry]' 2>/dev/null) || CANDIDATE=""
              if [ -n "$CANDIDATE" ] && [ ${#CANDIDATE} -lt 512000 ]; then
                ALL_RESULTS="$CANDIDATE"
              else
                RESULTS_TRUNCATED=true
                echo "::warning::Results output truncated to stay within GitHub output limits."
              fi
            fi
          fi

          SUMMARY="${SUMMARY}\n$FILE:$FILE_SUMMARY"
          echo -e "$FILE_SUMMARY"
          echo "::endgroup::"
        done

        # ── Guard: no files processed ──────────────────────────────────
        if [ "$TOTAL_FILES" -eq 0 ]; then
          echo "::warning::Glob matched entries but none were regular files."
          echo "passed=true" >> "$GITHUB_OUTPUT"
          echo "summary=No files found" >> "$GITHUB_OUTPUT"
          echo "results=[]" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # ── Set outputs ────────────────────────────────────────────────
        echo "passed=$PASSED" >> "$GITHUB_OUTPUT"

        echo "summary<<$DELIM" >> "$GITHUB_OUTPUT"
        echo -e "$SUMMARY" >> "$GITHUB_OUTPUT"
        echo "$DELIM" >> "$GITHUB_OUTPUT"

        echo "results<<${DELIM}_R" >> "$GITHUB_OUTPUT"
        echo "$ALL_RESULTS" >> "$GITHUB_OUTPUT"
        echo "${DELIM}_R" >> "$GITHUB_OUTPUT"

        # ── Job summary ────────────────────────────────────────────────
        {
          echo "## Emailens Email Preview Check"
          echo ""
          if [ "$PASSED" = true ]; then
            echo "**All $TOTAL_FILES template(s) passed** (threshold: $INPUT_THRESHOLD/100)"
          else
            echo "**$FAILED_FILES of $TOTAL_FILES template(s) failed** (threshold: $INPUT_THRESHOLD/100)"
          fi
          echo ""
          echo -e "$SUMMARY"
        } >> "$GITHUB_STEP_SUMMARY"

        # ── Exit ───────────────────────────────────────────────────────
        if [ "$PASSED" = false ]; then
          echo ""
          echo "Email compatibility check failed. $FAILED_FILES file(s) below threshold."
          exit 1
        fi

        echo ""
        echo "All email templates pass compatibility threshold ($INPUT_THRESHOLD/100)"
