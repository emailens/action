name: "Emailens Email Preview Check"
description: "Check HTML email templates for rendering issues across 15 email clients. Fails the build if compatibility scores drop below threshold. Also available as an MCP server for AI-assisted fixing."
author: "Emailens"

branding:
  icon: "mail"
  color: "purple"

inputs:
  pattern:
    description: "Glob pattern to find email HTML files (e.g. 'emails/**/*.html')"
    required: true
    default: "emails/**/*.html"
  threshold:
    description: "Minimum compatibility score (0-100) per client. Fails if any client scores below this."
    required: false
    default: "70"
  api-url:
    description: "Emailens API URL (override for self-hosted instances)"
    required: false
    default: "https://emailens.dev/api/preview"
  api-key:
    description: "Emailens API key for authenticated requests (optional for free tier)"
    required: false
  clients:
    description: "Comma-separated list of client IDs to check (default: all clients)"
    required: false
  fail-on-error:
    description: "Whether to fail the action if critical errors are found"
    required: false
    default: "true"

outputs:
  results:
    description: "JSON string with full analysis results"
  passed:
    description: "'true' if all files pass the threshold, 'false' otherwise"
  summary:
    description: "Human-readable summary of results"

runs:
  using: "composite"
  steps:
    - name: Find email templates
      id: find-files
      shell: bash
      run: |
        FILES=$(find . -path "./${{ inputs.pattern }}" -type f 2>/dev/null | head -50)
        if [ -z "$FILES" ]; then
          echo "::warning::No email HTML files found matching pattern '${{ inputs.pattern }}'"
          echo "files=" >> $GITHUB_OUTPUT
          exit 0
        fi
        echo "Found email templates:"
        echo "$FILES"
        # Store as JSON array for the check script
        JSON_FILES=$(echo "$FILES" | jq -R -s -c 'split("\n") | map(select(length > 0))')
        echo "files=$JSON_FILES" >> $GITHUB_OUTPUT

    - name: Check email compatibility
      if: steps.find-files.outputs.files != ''
      id: check
      shell: bash
      env:
        EMAIL_FILES: ${{ steps.find-files.outputs.files }}
        THRESHOLD: ${{ inputs.threshold }}
        API_URL: ${{ inputs.api-url }}
        API_KEY: ${{ inputs.api-key }}
        CLIENTS: ${{ inputs.clients }}
        FAIL_ON_ERROR: ${{ inputs.fail-on-error }}
      run: |
        PASSED=true
        SUMMARY=""
        ALL_RESULTS="[]"
        TOTAL_FILES=0
        FAILED_FILES=0

        for FILE in $(echo "$EMAIL_FILES" | jq -r '.[]'); do
          TOTAL_FILES=$((TOTAL_FILES + 1))
          echo "::group::Checking $FILE"

          HTML_CONTENT=$(cat "$FILE")

          # Build request body
          BODY=$(jq -n --arg html "$HTML_CONTENT" '{html: $html}')
          if [ -n "$CLIENTS" ]; then
            CLIENT_ARRAY=$(echo "$CLIENTS" | jq -R -c 'split(",")')
            BODY=$(echo "$BODY" | jq --argjson clients "$CLIENT_ARRAY" '. + {clients: $clients}')
          fi

          # Call the API
          HEADERS=(-H "Content-Type: application/json")
          if [ -n "$API_KEY" ]; then
            HEADERS+=(-H "Authorization: Bearer $API_KEY")
          fi

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "$API_URL" \
            "${HEADERS[@]}" \
            -d "$BODY" \
            --max-time 30)

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          RESPONSE_BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error file=$FILE::API request failed with HTTP $HTTP_CODE"
            PASSED=false
            FAILED_FILES=$((FAILED_FILES + 1))
            echo "::endgroup::"
            continue
          fi

          # Parse scores
          FILE_PASSED=true
          FILE_SUMMARY=""

          SCORES=$(echo "$RESPONSE_BODY" | jq -r '.compatibilityScores')
          for CLIENT_ID in $(echo "$SCORES" | jq -r 'keys[]'); do
            SCORE=$(echo "$SCORES" | jq -r --arg c "$CLIENT_ID" '.[$c].score')
            ERRORS=$(echo "$SCORES" | jq -r --arg c "$CLIENT_ID" '.[$c].errors')
            WARNINGS=$(echo "$SCORES" | jq -r --arg c "$CLIENT_ID" '.[$c].warnings')

            ICON="✅"
            if [ "$SCORE" -lt "$THRESHOLD" ]; then
              ICON="❌"
              FILE_PASSED=false
              echo "::error file=$FILE::$CLIENT_ID score $SCORE is below threshold $THRESHOLD (${ERRORS}E ${WARNINGS}W)"
            elif [ "$ERRORS" -gt 0 ] && [ "$FAIL_ON_ERROR" = "true" ]; then
              ICON="⚠️"
              FILE_PASSED=false
              echo "::warning file=$FILE::$CLIENT_ID has $ERRORS error(s) (score: $SCORE)"
            fi

            FILE_SUMMARY="$FILE_SUMMARY\n  $ICON $CLIENT_ID: $SCORE/100 (${ERRORS}E ${WARNINGS}W)"
          done

          if [ "$FILE_PASSED" = false ]; then
            PASSED=false
            FAILED_FILES=$((FAILED_FILES + 1))
          fi

          SUMMARY="$SUMMARY\n📄 $FILE:$FILE_SUMMARY"
          echo -e "$FILE_SUMMARY"
          echo "::endgroup::"
        done

        # Set outputs
        echo "passed=$PASSED" >> $GITHUB_OUTPUT
        echo "summary<<EOF" >> $GITHUB_OUTPUT
        echo -e "$SUMMARY" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

        # Write job summary
        echo "## Emailens Email Preview Check" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ "$PASSED" = true ]; then
          echo "✅ **All $TOTAL_FILES template(s) passed** (threshold: $THRESHOLD/100)" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ **$FAILED_FILES of $TOTAL_FILES template(s) failed** (threshold: $THRESHOLD/100)" >> $GITHUB_STEP_SUMMARY
        fi
        echo "" >> $GITHUB_STEP_SUMMARY
        echo -e "$SUMMARY" >> $GITHUB_STEP_SUMMARY

        # Exit with failure if any file failed
        if [ "$PASSED" = false ]; then
          echo ""
          echo "❌ Email compatibility check failed. $FAILED_FILES file(s) below threshold."
          exit 1
        fi

        echo ""
        echo "✅ All email templates pass compatibility threshold ($THRESHOLD/100)"
